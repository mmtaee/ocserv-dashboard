definitions:
  auth.ChangePasswordRequest:
    properties:
      new_password:
        minLength: 8
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  auth.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  auth.LoginResponse:
    properties:
      admin:
        $ref: '#/definitions/models.Administrator'
      token:
        type: string
    type: object
  models.Administrator:
    properties:
      created_at:
        type: string
      id:
        type: integer
      last_login:
        type: string
      role:
        enum:
        - super
        - admin
        type: string
      updated_at:
        type: string
      username:
        type: string
    required:
    - created_at
    - role
    - username
    type: object
  request.ErrorResponse:
    properties:
      code:
        type: integer
      error:
        items:
          type: string
        type: array
      message:
        type: string
    required:
    - code
    - message
    type: object
  request.MessageResponse:
    properties:
      message:
        type: string
    type: object
info:
  contact: {}
paths:
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Update authenticated admin's password
      parameters:
      - description: Bearer TOKEN
        in: header
        name: Authorization
        required: true
        type: string
      - description: Change Password Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/request.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/request.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/request.ErrorResponse'
      summary: Change Admin Password
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login with username and password
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/request.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/request.ErrorResponse'
      summary: Admin Login
      tags:
      - Auth
  /auth/profile:
    get:
      consumes:
      - application/json
      description: Return authenticated admin's profile
      parameters:
      - description: Bearer TOKEN
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Administrator'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/request.ErrorResponse'
      summary: Get Admin Profile
      tags:
      - Auth
swagger: "2.0"
