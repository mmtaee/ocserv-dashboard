definitions:
  auth.ChangePasswordRequest:
    properties:
      new_password:
        minLength: 8
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  auth.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  auth.LoginResponse:
    properties:
      admin:
        $ref: '#/definitions/models.Administrator'
      token:
        type: string
    type: object
  models.Administrator:
    properties:
      created_at:
        type: string
      id:
        type: integer
      is_suspended:
        type: boolean
      last_login:
        type: string
      role:
        enum:
        - super
        - admin
        type: string
      suspended_at:
        type: string
      suspended_reason:
        type: string
      updated_at:
        type: string
      username:
        type: string
    required:
    - created_at
    - role
    - username
    type: object
  models.OcservGroup:
    properties:
      config:
        $ref: '#/definitions/models.OcservGroupConfig'
      id:
        type: integer
      name:
        type: string
      owner_admin_id:
        type: integer
    required:
    - name
    - owner_admin_id
    type: object
  models.OcservGroupConfig:
    properties:
      cgroup:
        description: 'Linux control group to assign the VPN worker process to. Format:
          ''controller,subsystem:name''. Example: ''cpuset,cpu:test'''
        type: string
      deny-roaming:
        description: 'Disconnect client if its IP changes (e.g., due to network switch).
          Example: true'
        type: boolean
      dns:
        description: 'Comma-separated list of DNS servers to assign to the client.
          Example: ''8.8.8.8,1.1.1.1'''
        items:
          type: string
        type: array
      dpd:
        description: 'Dead Peer Detection timeout in seconds. Example: 90'
        type: integer
      explicit-ipv4:
        description: 'Static IPv4 address to assign to client. Example: ''192.168.100.10'''
        type: string
      idle-timeout:
        description: 'Time in seconds before disconnecting idle clients. Example:
          600'
        type: integer
      ipv4-network:
        description: 'The pool of addresses that leases will be given from. Example:
          ''192.168.1.0/24'''
        type: string
      iroute:
        description: 'Internal route available only via VPN. Format: ''IP/prefix''.
          Example: ''10.0.0.0/8'''
        type: string
      keepalive:
        description: 'Interval in seconds to send keep-alive pings. Example: 60'
        type: integer
      max-same-clients:
        description: 'Maximum simultaneous logins per user. Example: 2'
        type: integer
      mobile-dpd:
        description: 'DPD timeout specifically for mobile clients. Example: 300'
        type: integer
      mobile-idle-timeout:
        description: 'Idle timeout for mobile clients. Example: 900'
        type: integer
      mtu:
        description: 'Tunnel interface MTU to avoid fragmentation. Example: 1400'
        type: integer
      nbns:
        description: 'NetBIOS Name Servers (WINS) for Windows clients. Example: ''192.168.1.1'''
        type: string
      net-priority:
        description: 'Priority for routes; lower is higher priority. Example: 1'
        type: integer
      no-route:
        description: 'List of networks to exclude from VPN routing. Each entry should
          be in ''IP/prefix'' format. Example: [''192.168.0.0/16'', ''10.0.0.0/8'']'
        items:
          type: string
        type: array
      no-udp:
        description: 'Disables UDP, enforcing TCP-only VPN connection. Example: true'
        type: boolean
      restrict-user-to-ports:
        description: 'Comma-separated list of allowed (or blocked, if negated) protocols
          and ports. Supports ''tcp(port)'', ''udp(port)'', ''icmp()'', ''icmpv6()'',
          and negation with ''!()''. Example: ''tcp(443), tcp(80), udp(53)'', or ''!(tcp(22),
          udp(1194))'''
        type: string
      restrict-user-to-routes:
        description: 'Allow client access only to defined routes. Example: true'
        type: boolean
      route:
        description: 'Routes pushed to the client for routing traffic. Example: [''0.0.0.0/0'',
          ''10.10.0.0/16'']'
        items:
          type: string
        type: array
      rx-data-per-sec:
        description: 'Maximum receive bandwidth in bytes per second. Example: ''100000''
          for 100 KB/s'
        type: integer
      session-timeout:
        description: 'Max session time in seconds before forced disconnect. Example:
          3600'
        type: integer
      split-dns:
        description: 'List of domains over which the provided DNS servers should be
          used. Example: [''example.com'', ''internal.company.com'']'
        items:
          type: string
        type: array
      stats-report-time:
        description: 'Interval in seconds for stats reporting. Example: 300'
        type: integer
      tunnel-all-dns:
        description: 'Force all DNS traffic through the VPN tunnel. Example: true'
        type: boolean
      tx-data-per-sec:
        description: 'Maximum transmit bandwidth in bytes per second. Example: ''200000''
          for 200 KB/s'
        type: integer
    type: object
  models.OcservGroupResponse:
    properties:
      config:
        $ref: '#/definitions/models.OcservGroupConfig'
      id:
        type: integer
      name:
        type: string
      owner_admin_id:
        type: integer
      total_rx:
        type: integer
      total_tx:
        type: integer
    required:
    - name
    - owner_admin_id
    type: object
  models.System:
    properties:
      auto_delete_inactive_users:
        type: boolean
      client_profile_connection_name:
        type: string
      client_profile_server_address:
        type: string
      client_profile_server_port:
        type: integer
      google_captcha_secret:
        type: string
      google_captcha_site_key:
        type: string
      keep_inactive_user_days:
        type: integer
    type: object
  ocserv_group.CreateOcservGroupRequest:
    properties:
      config:
        $ref: '#/definitions/models.OcservGroupConfig'
      name:
        type: string
    required:
    - name
    type: object
  ocserv_group.UpdateOcservGroupRequest:
    properties:
      config:
        $ref: '#/definitions/models.OcservGroupConfig'
    type: object
  request.ErrorResponse:
    properties:
      code:
        type: integer
      error:
        items:
          type: string
        type: array
      message:
        type: string
    required:
    - code
    - message
    type: object
  request.MessageResponse:
    properties:
      message:
        type: string
    type: object
  super_admin.ChangeAdminPasswordRequest:
    properties:
      password:
        minLength: 8
        type: string
    required:
    - password
    type: object
  super_admin.CreateAdminRequest:
    properties:
      password:
        minLength: 8
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  super_admin.SuspendAdminRequest:
    properties:
      reason:
        type: string
    required:
    - reason
    type: object
  super_admin.UpdateAdminRequest:
    properties:
      username:
        type: string
    required:
    - username
    type: object
  system.UpdateSystemRequest:
    properties:
      auto_delete_inactive_users:
        type: boolean
      client_profile_connection_name:
        type: string
      client_profile_server_address:
        type: string
      client_profile_server_port:
        type: integer
      google_captcha_secret:
        type: string
      google_captcha_site_key:
        type: string
      keep_inactive_user_days:
        type: integer
    type: object
