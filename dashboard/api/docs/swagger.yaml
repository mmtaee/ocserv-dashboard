definitions:
  auth.ChangePasswordRequest:
    properties:
      new_password:
        minLength: 8
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  auth.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  auth.LoginResponse:
    properties:
      admin:
        $ref: '#/definitions/models.Administrator'
      token:
        type: string
    type: object
  models.Administrator:
    properties:
      created_at:
        type: string
      id:
        type: integer
      is_suspended:
        type: boolean
      last_login:
        type: string
      role:
        enum:
        - super
        - admin
        type: string
      suspended_at:
        type: string
      suspended_reason:
        type: string
      updated_at:
        type: string
      username:
        type: string
    required:
    - created_at
    - role
    - username
    type: object
  models.DailyTraffic:
    properties:
      date:
        description: 'Format: YYYY-MM-DD'
        type: string
      rx:
        description: in GiB
        type: number
      tx:
        description: in GiB
        type: number
    type: object
  models.OcservGroup:
    properties:
      config:
        $ref: '#/definitions/models.OcservGroupConfig'
      id:
        type: integer
      name:
        type: string
      owner_admin_id:
        type: integer
    required:
    - name
    - owner_admin_id
    type: object
  models.OcservGroupConfig:
    properties:
      cgroup:
        description: 'Linux control group to assign the VPN worker process to. Format:
          ''controller,subsystem:name''. Example: ''cpuset,cpu:test'''
        type: string
      deny-roaming:
        description: 'Disconnect client if its IP changes (e.g., due to network switch).
          Example: true'
        type: boolean
      dns:
        description: 'Comma-separated list of DNS servers to assign to the client.
          Example: ''8.8.8.8,1.1.1.1'''
        items:
          type: string
        type: array
      dpd:
        description: 'Dead Peer Detection timeout in seconds. Example: 90'
        type: integer
      explicit-ipv4:
        description: 'Static IPv4 address to assign to client. Example: ''192.168.100.10'''
        type: string
      idle-timeout:
        description: 'Time in seconds before disconnecting idle clients. Example:
          600'
        type: integer
      ipv4-network:
        description: 'The pool of addresses that leases will be given from. Example:
          ''192.168.1.0/24'''
        type: string
      iroute:
        description: 'Internal route available only via VPN. Format: ''IP/prefix''.
          Example: ''10.0.0.0/8'''
        type: string
      keepalive:
        description: 'Interval in seconds to send keep-alive pings. Example: 60'
        type: integer
      max-same-clients:
        description: 'Maximum simultaneous logins per user. Example: 2'
        type: integer
      mobile-dpd:
        description: 'DPD timeout specifically for mobile clients. Example: 300'
        type: integer
      mobile-idle-timeout:
        description: 'Idle timeout for mobile clients. Example: 900'
        type: integer
      mtu:
        description: 'Tunnel interface MTU to avoid fragmentation. Example: 1400'
        type: integer
      nbns:
        description: 'NetBIOS Name Servers (WINS) for Windows clients. Example: ''192.168.1.1'''
        type: string
      net-priority:
        description: 'Priority for routes; lower is higher priority. Example: 1'
        type: integer
      no-route:
        description: 'List of networks to exclude from VPN routing. Each entry should
          be in ''IP/prefix'' format. Example: [''192.168.0.0/16'', ''10.0.0.0/8'']'
        items:
          type: string
        type: array
      no-udp:
        description: 'Disables UDP, enforcing TCP-only VPN connection. Example: true'
        type: boolean
      restrict-user-to-ports:
        description: 'Comma-separated list of allowed (or blocked, if negated) protocols
          and ports. Supports ''tcp(port)'', ''udp(port)'', ''icmp()'', ''icmpv6()'',
          and negation with ''!()''. Example: ''tcp(443), tcp(80), udp(53)'', or ''!(tcp(22),
          udp(1194))'''
        type: string
      restrict-user-to-routes:
        description: 'Allow client access only to defined routes. Example: true'
        type: boolean
      route:
        description: 'Routes pushed to the client for routing traffic. Example: [''0.0.0.0/0'',
          ''10.10.0.0/16'']'
        items:
          type: string
        type: array
      rx-data-per-sec:
        description: 'Maximum receive bandwidth in bytes per second. Example: ''100000''
          for 100 KB/s'
        type: integer
      session-timeout:
        description: 'Max session time in seconds before forced disconnect. Example:
          3600'
        type: integer
      split-dns:
        description: 'List of domains over which the provided DNS servers should be
          used. Example: [''example.com'', ''internal.company.com'']'
        items:
          type: string
        type: array
      stats-report-time:
        description: 'Interval in seconds for stats reporting. Example: 300'
        type: integer
      tunnel-all-dns:
        description: 'Force all DNS traffic through the VPN tunnel. Example: true'
        type: boolean
      tx-data-per-sec:
        description: 'Maximum transmit bandwidth in bytes per second. Example: ''200000''
          for 200 KB/s'
        type: integer
    type: object
  models.OcservGroupResponse:
    properties:
      config:
        $ref: '#/definitions/models.OcservGroupConfig'
      id:
        type: integer
      name:
        type: string
      owner_admin_id:
        type: integer
      total_rx:
        type: integer
      total_tx:
        type: integer
    required:
    - name
    - owner_admin_id
    type: object
  models.OcservInfo:
    properties:
      status:
        type: string
      version:
        $ref: '#/definitions/models.ServerVersion'
    required:
    - status
    - version
    type: object
  models.OcservUser:
    properties:
      config:
        $ref: '#/definitions/models.OcservUserConfig'
      created_at:
        type: string
      deactivated_at:
        type: string
      description:
        type: string
      expire_at:
        type: string
      group:
        type: string
      id:
        type: integer
      is_locked:
        type: boolean
      owner_admin_id:
        type: integer
      password:
        description: Length matches migration 007 (ocserv_users.password column);
          do not widen without a new migration.
        type: string
      rx:
        description: Receive in bytes
        type: integer
      traffic_size:
        description: in GiB  >> x * 1024 ** 3
        type: integer
      traffic_type:
        enum:
        - Free
        - MonthlyTransmit
        - MonthlyReceive
        - TotallyTransmit
        - TotallyReceive
        type: string
      tx:
        description: Transmit in bytes
        type: integer
      updated_at:
        type: string
      username:
        type: string
    required:
    - created_at
    - group
    - is_locked
    - owner_admin_id
    - password
    - rx
    - traffic_size
    - traffic_type
    - tx
    - username
    type: object
  models.OcservUserConfig:
    properties:
      dns:
        description: 'Comma-separated list of DNS servers to assign to the user. Example:
          ''8.8.8.8,1.1.1.1'''
        items:
          type: string
        type: array
      explicit-ipv4:
        description: 'Static IPv4 address to assign to the user. Example: ''192.168.100.10'''
        type: string
      idle-timeout:
        description: 'Time in seconds before disconnecting idle users. Example: 600'
        type: integer
      ipv4-network:
        description: 'The pool of addresses from which to assign to the user. Example:
          ''192.168.1.0/24'''
        type: string
      iroute:
        description: 'Internal route available only via VPN. Example: ''10.0.0.0/8'''
        type: string
      mobile-idle-timeout:
        description: 'Idle timeout in seconds for mobile users. Example: 900'
        type: integer
      nbns:
        description: 'NetBIOS Name Servers (WINS) for Windows clients. Example: ''192.168.1.1'''
        type: string
      no-route:
        description: 'List of networks to exclude from VPN routing. Example: [''192.168.0.0/16'',
          ''10.0.0.0/8'']'
        items:
          type: string
        type: array
      rekey-time:
        description: 'Rekey time in seconds; triggers key renegotiation. Example:
          86400 for 24 hours'
        type: integer
      restrict-to-ports:
        description: 'Comma-separated list of allowed or blocked ports/protocols.
          Supports ''tcp(port)'', ''udp(port)'', ''icmp()'', ''icmpv6()'', and negation
          with ''!()''. Example: ''tcp(443), udp(53)'' or ''!(tcp(22), udp(1194))'''
        type: string
      restrict-to-routes:
        description: 'Allow user access only to defined routes. Example: true'
        type: boolean
      route:
        description: 'Routes pushed to the user for routing traffic. Example: [''0.0.0.0/0'',
          ''10.10.0.0/16'']'
        items:
          type: string
        type: array
      session-timeout:
        description: 'Maximum session time in seconds before forced disconnect. Example:
          3600'
        type: integer
      split-dns:
        description: 'List of domains over which the provided DNS servers should be
          used. Example: [''example.com'', ''internal.company.com'']'
        items:
          type: string
        type: array
    type: object
  models.OcservUserSessionLog:
    properties:
      created_at:
        type: string
      event:
        enum:
        - user-agent
        - handshake
        - periodic-stats
        - disconnect
        type: string
      ip:
        type: string
      message:
        type: string
      username:
        type: string
    required:
    - created_at
    - event
    - message
    - username
    type: object
  models.OnlineUserSession:
    properties:
      _Connected at:
        type: string
      Average RX:
        type: string
      Average TX:
        type: string
      Groupname:
        type: string
      Username:
        type: string
    type: object
  models.ServerVersion:
    properties:
      occtl_version:
        type: string
      ocserv_version:
        type: string
    type: object
  models.System:
    properties:
      auto_delete_inactive_users:
        type: boolean
      client_profile_connection_name:
        type: string
      client_profile_server_address:
        type: string
      client_profile_server_port:
        type: integer
      google_captcha_secret:
        type: string
      google_captcha_site_key:
        type: string
      keep_inactive_user_days:
        type: integer
    type: object
  ocserv_group.CreateOcservGroupRequest:
    properties:
      config:
        $ref: '#/definitions/models.OcservGroupConfig'
      name:
        type: string
    required:
    - name
    type: object
  ocserv_group.UpdateOcservGroupRequest:
    properties:
      config:
        $ref: '#/definitions/models.OcservGroupConfig'
    type: object
  ocserv_user.ActivateUserData:
    properties:
      expire_at:
        example: "2025-12-31"
        type: string
    type: object
  ocserv_user.CreateOcservUserRequest:
    properties:
      config:
        $ref: '#/definitions/models.OcservUserConfig'
      description:
        example: User for testing VPN access
        maxLength: 1024
        type: string
      expire_at:
        example: "2025-12-31"
        type: string
      group:
        type: string
      password:
        maxLength: 32
        minLength: 2
        type: string
      traffic_size:
        description: in GiB
        example: 10
        minimum: 0
        type: integer
      traffic_type:
        enum:
        - Free
        - MonthlyTransmit
        - MonthlyReceive
        - TotallyTransmit
        - TotallyReceive
        type: string
      unlimited:
        default: false
        example: false
        type: boolean
      username:
        maxLength: 32
        minLength: 2
        type: string
    required:
    - config
    - group
    - password
    - traffic_type
    - username
    type: object
  ocserv_user.GetOnlineSessionsRequest:
    properties:
      usernames:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - usernames
    type: object
  ocserv_user.OcservUsersResponse:
    properties:
      meta:
        $ref: '#/definitions/request.Pagination'
      result:
        items:
          $ref: '#/definitions/models.OcservUser'
        type: array
    type: object
  ocserv_user.SessionLogsResponse:
    properties:
      meta:
        $ref: '#/definitions/request.Pagination'
      result:
        items:
          $ref: '#/definitions/models.OcservUserSessionLog'
        type: array
    type: object
  ocserv_user.StatisticsResponse:
    properties:
      statistics:
        items:
          $ref: '#/definitions/models.DailyTraffic'
        type: array
      total_bandwidths:
        $ref: '#/definitions/ocserv_user.TotalBandwidths'
    required:
    - statistics
    - total_bandwidths
    type: object
  ocserv_user.TotalBandwidths:
    properties:
      rx:
        description: in GiB
        type: number
      tx:
        description: in GiB
        type: number
    type: object
  ocserv_user.UpdateOcservUserRequest:
    properties:
      config:
        $ref: '#/definitions/models.OcservUserConfig'
      description:
        example: User for testing VPN access
        maxLength: 1024
        type: string
      expire_at:
        example: "2025-12-31"
        type: string
      group:
        example: defaults
        type: string
      password:
        maxLength: 32
        minLength: 2
        type: string
      traffic_size:
        description: in GiB
        example: 10
        minimum: 0
        type: integer
      traffic_type:
        enum:
        - Free
        - MonthlyTransmit
        - MonthlyReceive
        - TotallyTransmit
        - TotallyReceive
        type: string
      unlimited:
        default: false
        example: false
        type: boolean
    type: object
  report.OcservUserReportResponse:
    properties:
      active:
        type: integer
      deactivated:
        type: integer
      locked:
        type: integer
      online:
        type: integer
    type: object
  report.SessionLogsResponse:
    properties:
      meta:
        $ref: '#/definitions/request.Pagination'
      result:
        items:
          $ref: '#/definitions/models.OcservUserSessionLog'
        type: array
    type: object
  repository.TotalBandwidths:
    properties:
      rx:
        description: in GiB
        type: number
      tx:
        description: in GiB
        type: number
    type: object
  request.ErrorResponse:
    properties:
      code:
        type: integer
      error:
        items:
          type: string
        type: array
      message:
        type: string
    required:
    - code
    - message
    type: object
  request.MessageResponse:
    properties:
      message:
        type: string
    type: object
  request.Pagination:
    properties:
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  super_admin.ChangeAdminPasswordRequest:
    properties:
      password:
        minLength: 8
        type: string
    required:
    - password
    type: object
  super_admin.CreateAdminRequest:
    properties:
      password:
        minLength: 8
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  super_admin.SuspendAdminRequest:
    properties:
      reason:
        type: string
    required:
    - reason
    type: object
  super_admin.UpdateAdminRequest:
    properties:
      username:
        type: string
    required:
    - username
    type: object
  system.UpdateSystemRequest:
    properties:
      auto_delete_inactive_users:
        type: boolean
      client_profile_connection_name:
        type: string
      client_profile_server_address:
        type: string
      client_profile_server_port:
        type: integer
      google_captcha_secret:
        type: string
      google_captcha_site_key:
        type: string
      keep_inactive_user_days:
        type: integer
    type: object
info:
  contact: {}
paths:
  /auth/change-password:
    post:
      consumes:
      - application/json
      description: Update authenticated admin's password
      parameters:
      - description: Bearer TOKEN
        in: header
        name: Authorization
        required: true
        type: string
      - description: Change Password Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/request.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/request.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/request.ErrorResponse'
      summary: Change Admin Password
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login with username and password
      parameters:
      - description: Login Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/request.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/request.ErrorResponse'
      summary: Admin Login
      tags:
      - Auth
  /auth/profile:
    get:
      consumes:
      - application/json
      description: Return authenticated admin's profile
      parameters:
      - description: Bearer TOKEN
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Administrator'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/request.ErrorResponse'
      summary: Get Admin Profile
      tags:
      - Auth
  /occtl/commands:
    get:
      consumes:
      - application/json
      description: Occtl Commands
      parameters:
      - description: Bearer TOKEN
        in: header
        name: Authorization
        required: true
        type: string
      - description: Command Action ID (1 to 16)
        in: query
        name: action
        required: true
        type: integer
      - description: Optional parameter depending on command
        in: query
        name: value
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/request.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/request.ErrorResponse'
      summary: Occtl Commands
      tags:
      - OCCTL
  /occtl/server_info:
    get:
      consumes:
      - application/json
      description: Server information
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.OcservInfo'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/request.ErrorResponse'
      summary: Server information
      tags:
      - OCCTL
  /ocserv/groups:
    get:
      consumes:
      - application/json
      description: Get all Ocserv groups for current admin (superadmin can access
        all groups)
      parameters:
      - description: Bearer TOKEN
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.OcservGroupResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/request.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/request.ErrorResponse'
      summary: List Ocserv Groups
      tags:
      - Ocserv Groups
    post:
      consumes:
      - application/json
      description: Create new Ocserv group (superadmin can create groups for any admin)
      parameters:
      - description: Bearer TOKEN
        in: header
        name: Authorization
        required: true
        type: string
      - description: Create group data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ocserv_group.CreateOcservGroupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.OcservGroup'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/request.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/request.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/request.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/request.ErrorResponse'
      summary: Create Ocserv Group
      tags:
      - Ocserv Groups
  /ocserv/groups/{id}:
    delete:
      consumes:
      - application/json
      description: Delete Ocserv group by ID (superadmin can delete any group)
      parameters:
      - description: Bearer TOKEN
        in: header
        name: Authorization
        required: true
        type: string
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/request.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/request.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/request.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/request.ErrorResponse'
      summary: Delete Ocserv Group
      tags:
      - Ocserv Groups
    get:
      consumes:
      - application/json
      description: Get Ocserv group by ID (superadmin can access any group)
      parameters:
      - description: Bearer TOKEN
        in: header
        name: Authorization
        required: true
        type: string
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.OcservGroupResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/request.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/request.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/request.ErrorResponse'
      summary: Get Ocserv Group
      tags:
      - Ocserv Groups
    post:
      consumes:
      - application/json
      description: Update Ocserv group by ID (superadmin can update any group)
      parameters:
      - description: Bearer TOKEN
        in: header
        name: Authorization
        required: true
        type: string
      - description: Group ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update group data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/ocserv_group.UpdateOcservGroupRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.OcservGroup'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/request.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/request.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/request.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/request.ErrorResponse'
      summary: Update Ocserv Group
      tags:
      - Ocserv Groups
  /ocserv/groups/lookup:
    get:
      consumes:
      - application/json
      description: Get list of group names (superadmin can access all groups)
      parameters:
      - description: Bearer TOKEN
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
