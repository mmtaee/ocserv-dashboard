services:
  postgres:
    image: postgres:17
    container_name: ocserv-postgres-dev
    restart: always
    env_file:
      - .env
    volumes:
      - ${POSTGRES_DATA_PATH:-./data/dev/postgres}:/var/lib/postgresql/data
    networks:
      - dev-app
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  admin_api:
    build:
      context: ../../..
      dockerfile: deploy/docker/build/Dockerfile.go
      target: admin_api
      args:
        - GO_PROXY=${GO_PROXY}
        - DEBIAN_MIRROR=${DEBIAN_MIRROR}
        - DEBIAN_SECURITY_MIRROR=${DEBIAN_SECURITY_MIRROR}
    container_name: ocserv-admin-api-dev
    env_file:
      - .env
    environment:
      - DEBUG=${ADMIN_API_DEBUG:-true}
      - HOST=${ADMIN_API_HOST:-0.0.0.0}
      - PORT=${ADMIN_API_PORT:-8080}
      - POSTGRES_HOST=postgres
    ports:
      - "${ADMIN_API_PORT:-8080}:${ADMIN_API_PORT:-8080}"
    networks:
      - dev-app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  customer_api:
    build:
      context: ../../..
      dockerfile: deploy/docker/build/Dockerfile.go
      target: customer_api
      args:
        - GO_PROXY=${GO_PROXY}
        - DEBIAN_MIRROR=${DEBIAN_MIRROR}
        - DEBIAN_SECURITY_MIRROR=${DEBIAN_SECURITY_MIRROR}
    container_name: ocserv-customer-api-dev
    env_file:
      - .env
    environment:
      - DEBUG=${CUSTOMER_API_DEBUG:-true}
      - HOST=${CUSTOMER_API_HOST:-0.0.0.0}
      - PORT=${CUSTOMER_API_PORT:-8081}
      - POSTGRES_HOST=postgres
    ports:
      - "${CUSTOMER_API_PORT:-8081}:${CUSTOMER_API_PORT:-8081}"
    networks:
      - dev-app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ocserv:
    build:
      context: ../../..
      dockerfile: deploy/docker/build/Dockerfile.ocserv
      args:
        - OCSERV_VERSION=${OCSERV_VERSION:-1.3.0}
        - GO_PROXY=${GO_PROXY}
        - DEBIAN_MIRROR=${DEBIAN_MIRROR}
        - DEBIAN_SECURITY_MIRROR=${DEBIAN_SECURITY_MIRROR}
    container_name: ocserv-dev
    privileged: true
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - ./data/dev/ocserv:/etc/ocserv
      - ./data/dev/telegram_receipts:${TELEGRAM_RECEIPTS_DIR:-/opt/ocserv_dashboard/uploads/receipts}
    ports:
      - "${OCSERV_PORT:-443}:443/tcp"
      - "${OCSERV_PORT:-443}:443/udp"
    networks:
      - dev-app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  dev-app:
    driver: bridge
