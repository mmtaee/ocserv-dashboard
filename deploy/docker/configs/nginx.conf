upstream admin_api_backend { server 127.0.0.1:8080; }
upstream customer_api_backend { server 127.0.0.1:8081; }

server {
    listen 80;
    server_name _;

    # Admin UI
    location /admin {
        alias /var/www/admin;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # Customer UI
    location / {
        alias /var/www/customer;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Admin API
    location ~ ^/admin/api {
        rewrite ^/admin(/api.*)$ $1 break;
        proxy_pass http://admin_api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Customer API
    location ~ ^/customer/api {
        rewrite ^/customer(/api.*)$ $1 break;
        proxy_pass http://customer_api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/cert.key;

    # Admin UI
    location /admin {
        alias /var/www/admin;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # Customer UI
    location / {
        alias /var/www/customer;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Admin API
    location ~ ^/admin/api {
        rewrite ^/admin(/api.*)$ $1 break;
        proxy_pass http://admin_api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Customer API
    location ~ ^/customer/api {
        rewrite ^/customer(/api.*)$ $1 break;
        proxy_pass http://customer_api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
